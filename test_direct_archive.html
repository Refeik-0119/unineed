<!DOCTYPE html>
<html>
<head>
    <title>Direct Archive Form Test</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div class="container mt-5">
    <h2>Test Archive Form Directly</h2>
    <p>This form submits directly to admin/users.php to test the POST handler.</p>
    
    <form method="POST" action="admin/users.php?add_type=student" class="border p-4">
        <h5>Year Levels</h5>
        <div class="form-check">
            <input class="form-check-input" type="checkbox" name="archive_year_levels[]" value="1" id="y1" checked>
            <label class="form-check-label" for="y1">1st Year</label>
        </div>
        <div class="form-check">
            <input class="form-check-input" type="checkbox" name="archive_year_levels[]" value="4" id="y4" checked>
            <label class="form-check-label" for="y4">4th Year</label>
        </div>
        
        <h5 class="mt-3">Courses</h5>
        <div class="form-check">
            <input class="form-check-input" type="checkbox" name="archive_courses[]" value="Bookkeeping" id="c1" checked>
            <label class="form-check-label" for="c1">Bookkeeping</label>
        </div>
        
        <div class="mb-3 mt-3">
            <label class="form-label">Archive Date</label>
            <input type="date" class="form-control" name="archive_date" value="2026-04-20" required>
        </div>
        
        <button type="submit" name="set_archive_criteria" value="1" class="btn btn-warning">
            Submit Test Form
        </button>
    </form>
    
    <p class="mt-3 alert alert-info">After submission, you should see a success message on the admin page.</p>
</div>
</body>
</html>
